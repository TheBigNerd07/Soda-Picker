services:
  soda-picker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soda-picker
    restart: unless-stopped
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      TZ: ${TZ:-America/Los_Angeles}
      NO_SODA_BEFORE: ${NO_SODA_BEFORE:-10:30}
      WEEKEND_NO_SODA_BEFORE: ${WEEKEND_NO_SODA_BEFORE:-11:00}
      DAILY_CAFFEINE_LIMIT_MG: ${DAILY_CAFFEINE_LIMIT_MG:-160}
      WEEKEND_DAILY_CAFFEINE_LIMIT_MG: ${WEEKEND_DAILY_CAFFEINE_LIMIT_MG:-180}
      CAFFEINE_CUTOFF_HOUR: ${CAFFEINE_CUTOFF_HOUR:-15}
      WEEKEND_CAFFEINE_CUTOFF_HOUR: ${WEEKEND_CAFFEINE_CUTOFF_HOUR:-16}
      BEDTIME_HOUR: ${BEDTIME_HOUR:-23}
      WEEKEND_BEDTIME_HOUR: ${WEEKEND_BEDTIME_HOUR:-23}
      LATEST_CAFFEINE_HOURS_BEFORE_BED: ${LATEST_CAFFEINE_HOURS_BEFORE_BED:-6}
      DUPLICATE_LOOKBACK: ${DUPLICATE_LOOKBACK:-4}
      CSV_PATH: ${CSV_PATH:-/data/sample_sodas.csv}
      DATABASE_PATH: ${DATABASE_PATH:-/data/soda_picker.db}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
      CHAOS_MODE_DEFAULT: ${CHAOS_MODE_DEFAULT:-false}
      REMINDER_ENABLED: ${REMINDER_ENABLED:-false}
      REMINDER_TIME: ${REMINDER_TIME:-10:30}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"APP_PORT\", \"8000\")}/healthz', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
